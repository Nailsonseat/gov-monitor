services:
  pipeline:
    build:
      context: .
      network: host
    container_name: gov_monitor_pipeline
    volumes:
      # Mount only src so live code edits apply without overwriting the image .venv.
      - ./src:/app/src
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DB_CA_CERT=${DB_CA_CERT}
      - DATA_GOV_IN_API_KEY=${DATA_GOV_IN_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - TARGET_CITY=${TARGET_CITY}
      - TARGET_DISTRICT=${TARGET_DISTRICT}
      - LANGUAGE_TARGET=${LANGUAGE_TARGET}
      - API_FETCH_INTERVAL_SECONDS=${API_FETCH_INTERVAL_SECONDS:-86400}
      - MAX_ROWS_PER_API_CALL=${MAX_ROWS_PER_API_CALL:-100}
    restart: on-failure

  metabase:
    image: metabase/metabase:v0.62.2
    container_name: gov_monitor_dashboard
    ports:
      - "3000:3000"
    environment:
      - MB_JETTY_PORT=3000
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: unless-stopped
